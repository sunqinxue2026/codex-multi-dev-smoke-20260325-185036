name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        run: python -m pip install uv

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Run backend tests
        run: uv run pytest -q tests/test_api.py tests/smoke_test.py

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
